name: release_image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "手動実行時のイメージタグ（未指定なら manual-<sha7>）"
        required: false
        default: ""
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

concurrency:
  group: repo-audit-release-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve image tag
        id: meta
        shell: bash
        env:
          IMAGE_REPO: ${{ github.repository }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          IMAGE="$(printf "%s" "${IMAGE_REPO}" | tr "[:upper:]" "[:lower:]")"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          elif [ -n "${INPUT_TAG}" ]; then
            TAG="${INPUT_TAG}"
          else
            TAG="manual-${GITHUB_SHA::7}"
          fi
          echo "image=ghcr.io/${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved image: ghcr.io/${IMAGE}:${TAG}"
      - name: Build and push image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ steps.meta.outputs.image }}"
          TAG="${{ steps.meta.outputs.tag }}"
          docker build -t "${IMAGE}:${TAG}" .
          docker push "${IMAGE}:${TAG}"
